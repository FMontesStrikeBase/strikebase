[build]
  functions = "netlify/functions"
 
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
 
[[headers]]
  for = "/admin/config.yml"
  [headers.values]
    Content-Type = "text/yaml"
 
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.gstatic.com https://*.firebaseio.com https://*.firebaseapp.com https://*.firebase.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://fonts.googleapis.com https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebaseapp.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com;"
