<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blog · Disciplina, Hábitos y Productividad · STRIKEBASE</title>
<meta name="description" content="Artículos sobre hábitos, disciplina y productividad escritos desde la experiencia militar. Tácticas reales para construir la vida que quieres."/>
<meta name="keywords" content="blog hábitos, disciplina militar, productividad, artículos hábitos, autosuperación"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1A1A12;--paper:#F2EDE0;--paper-dim:#E5DFC8;
  --accent:#D4541A;--sand:#C8C09A;--sand-dim:#A09870;
  --white:#FAFAF5;--muted:#8A8570;--success:#4A6B2C;
}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;line-height:1.6;}

nav{background:var(--ink);padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--white);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:24px;align-items:center;}
.nav-links a{font-family:'DM Mono',monospace;font-size:11px;color:var(--sand-dim);text-decoration:none;letter-spacing:.08em;}
.nav-links a:hover{color:var(--sand);}
.nav-cta{background:var(--accent);color:var(--white)!important;padding:7px 16px;border-radius:4px;}

.blog-hero{background:var(--ink);padding:5rem 2rem 3.5rem;text-align:center;}
.blog-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--accent);margin-bottom:1rem;display:block;}
.blog-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,8vw,90px);color:var(--white);line-height:.95;letter-spacing:1px;margin-bottom:1.25rem;}
.blog-title span{color:var(--accent);}
.blog-sub{font-size:15px;color:var(--sand-dim);max-width:560px;margin:0 auto;font-weight:300;line-height:1.7;}

.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:2rem 2rem 0;}
.filter-chip{padding:7px 16px;border:0.5px solid var(--sand-dim);border-radius:999px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;color:var(--muted);background:var(--white);cursor:pointer;transition:all .15s;}
.filter-chip:hover{border-color:var(--accent);}
.filter-chip.active{background:var(--ink);color:var(--white);border-color:var(--ink);}

.posts-wrap{max-width:1000px;margin:0 auto;padding:3rem 2rem 5rem;}
.posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}

.post-card{background:var(--white);border:0.5px solid var(--paper-dim);border-radius:10px;overflow:hidden;text-decoration:none;color:var(--ink);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.post-card:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(26,26,18,0.08);}
.post-img{width:100%;height:160px;background:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.post-img img{width:100%;height:100%;object-fit:cover;}
.post-img-placeholder{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);opacity:.4;}
.post-body{padding:1.25rem;flex:1;display:flex;flex-direction:column;}
.post-cat{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:.12em;margin-bottom:8px;text-transform:uppercase;}
.post-title{font-size:16px;font-weight:600;line-height:1.35;margin-bottom:8px;flex:1;}
.post-desc{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:12px;font-weight:300;}
.post-meta{display:flex;align-items:center;gap:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--sand-dim);padding-top:10px;border-top:0.5px solid var(--paper-dim);}

.empty-state{text-align:center;padding:4rem 2rem;color:var(--muted);}
.empty-state-title{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--ink);margin-bottom:1rem;}
.loading-state{text-align:center;padding:4rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;}

footer{background:var(--ink);padding:2rem;text-align:center;}
.footer-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--white);}
.footer-logo span{color:var(--accent);}
.footer-sub{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--muted);margin-top:4px;}
.footer-links{display:flex;gap:20px;justify-content:center;margin-top:1rem;}
.footer-links a{font-size:12px;color:var(--muted);text-decoration:none;}
.footer-links a:hover{color:var(--sand);}

@media(max-width:600px){
  nav{padding:.9rem 1.25rem;}
  .nav-links{gap:12px;}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">STRIKE<span>BASE</span></a>
  <div class="nav-links">
    <a href="/plantilla.html">Plantilla</a>
    <a href="/" class="nav-cta">APP GRATIS</a>
  </div>
</nav>

<div class="blog-hero">
  <span class="blog-tag">// BLOG STRIKEBASE</span>
  <h1 class="blog-title">DISCIPLINA Y<br/><span>HÁBITOS</span></h1>
  <p class="blog-sub">Tácticas reales para construir la vida que quieres. Escrito desde la experiencia, respaldado por evidencia.</p>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" data-cat="all" onclick="filterPosts('all',this)">TODOS</button>
  <button class="filter-chip" data-cat="productividad" onclick="filterPosts('productividad',this)">PRODUCTIVIDAD</button>
  <button class="filter-chip" data-cat="salud" onclick="filterPosts('salud',this)">SALUD Y BIENESTAR</button>
  <button class="filter-chip" data-cat="finanzas" onclick="filterPosts('finanzas',this)">FINANZAS</button>
  <button class="filter-chip" data-cat="disciplina" onclick="filterPosts('disciplina',this)">DISCIPLINA</button>
  <button class="filter-chip" data-cat="rutinas" onclick="filterPosts('rutinas',this)">RUTINAS</button>
</div>

<div class="posts-wrap">
  <div class="posts-grid" id="postsGrid">
    <div class="loading-state">Cargando artículos...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">STRIKE<span>BASE</span></div>
  <div class="footer-sub">// SISTEMA DE VIDA PERSONALIZADO //</div>
  <div class="footer-links">
    <a href="/">App</a>
    <a href="/blog.html">Blog</a>
    <a href="/plantilla.html">Plantilla</a>
    <a href="mailto:contacto@strikebase.net.pe">Contacto</a>
  </div>
</footer>

<script>
// ── CONFIG: GitHub repo info ──
const GH_USER = 'FMontesStrikeBase';
const GH_REPO = 'strikebase';
const GH_BRANCH = 'main';
const POSTS_PATH = '_posts';

const CAT_LABELS = {
  productividad: 'Productividad',
  salud: 'Salud y Bienestar',
  finanzas: 'Hábitos Financieros',
  disciplina: 'Disciplina Mental',
  rutinas: 'Rutinas'
};

let allPosts = [];

// ── Parse frontmatter from markdown ──
function parseFrontmatter(raw){
  const match = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
  if(!match) return null;
  const fmText = match[1];
  const body = match[2];
  const fm = {};
  fmText.split('\n').forEach(line=>{
    const idx = line.indexOf(':');
    if(idx===-1) return;
    let key = line.slice(0,idx).trim();
    let val = line.slice(idx+1).trim();
    val = val.replace(/^["']|["']$/g,'');
    fm[key] = val;
  });
  return {...fm, body};
}

function slugFromFilename(name){
  return name.replace(/\.md$/,'');
}

async function loadPosts(){
  const grid = document.getElementById('postsGrid');
  try{
    const listUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${POSTS_PATH}?ref=${GH_BRANCH}`;
    const listRes = await fetch(listUrl);
    if(!listRes.ok) throw new Error('No se pudo listar artículos');
    const files = await listRes.json();
    const mdFiles = Array.isArray(files) ? files.filter(f=>f.name.endsWith('.md')) : [];

    if(mdFiles.length===0){
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-state-title">AÚN NO HAY ARTÍCULOS</div>
        <p>Publica tu primer artículo desde <a href="/admin" style="color:var(--accent);">strikebase.net.pe/admin</a></p>
      </div>`;
      return;
    }

    const posts = await Promise.all(mdFiles.map(async f=>{
      const rawRes = await fetch(f.download_url);
      const raw = await rawRes.text();
      const fm = parseFrontmatter(raw);
      if(!fm) return null;
      return {
        slug: slugFromFilename(f.name),
        title: fm.title||'Sin título',
        date: fm.date||'',
        description: fm.description||'',
        category: fm.category||'productividad',
        readtime: fm.readtime||'5',
        image: fm.image||'',
        published: fm.published!=='false',
        body: fm.body||''
      };
    }));

    allPosts = posts.filter(p=>p && p.published).sort((a,b)=>new Date(b.date)-new Date(a.date));
    renderPosts(allPosts);
  }catch(e){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-title">NO SE PUDIERON CARGAR LOS ARTÍCULOS</div>
      <p>Verifica tu conexión o vuelve a intentarlo en unos minutos.</p>
    </div>`;
  }
}

function renderPosts(posts){
  const grid = document.getElementById('postsGrid');
  if(posts.length===0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
      <div class="empty-state-title">SIN ARTÍCULOS EN ESTA CATEGORÍA</div>
      <p>Prueba otra categoría o vuelve pronto.</p>
    </div>`;
    return;
  }
  grid.innerHTML = '';
  posts.forEach(p=>{
    const dateObj = p.date ? new Date(p.date) : null;
    const dateStr = dateObj ? dateObj.toLocaleDateString('es-PE',{day:'numeric',month:'short',year:'numeric'}) : '';
    const card = document.createElement('a');
    card.href = `/post.html?slug=${encodeURIComponent(p.slug)}`;
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-img">${p.image ? `<img src="${p.image}" alt="${p.title}"/>` : `<div class="post-img-placeholder">SB</div>`}</div>
      <div class="post-body">
        <div class="post-cat">${CAT_LABELS[p.category]||p.category}</div>
        <div class="post-title">${p.title}</div>
        <div class="post-desc">${p.description}</div>
        <div class="post-meta"><span>${dateStr}</span><span>·</span><span>${p.readtime} min</span></div>
      </div>`;
    grid.appendChild(card);
  });
}

window.filterPosts = function(cat, btn){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  if(cat==='all') renderPosts(allPosts);
  else renderPosts(allPosts.filter(p=>p.category===cat));
};

loadPosts();
</script>
</body>
</html>
